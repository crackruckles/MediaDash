overview: "The one plugin a Jellyfin library owner needs: finds duplicates, broken files, oversized encodes, unwanted or missing language tracks, and misplaced files — then fixes them safely."
description: >
  MediaDash keeps your Jellyfin library tidy, complete, and playable. It scans
  for duplicate copies, files that won't play, encodes above your quality ceiling,
  audio/subtitle tracks in unwanted languages, videos missing subtitles, and
  files sitting in the wrong library folder. Each fix type can run automatically
  or wait for your approval, with a built-in recycle bin so nothing is lost by
  accident. Dry-run mode ships on by default.
