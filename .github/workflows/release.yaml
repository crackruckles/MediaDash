name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Set version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish
        run: >
          dotnet publish Jellyfin.Plugin.MediaDash/Jellyfin.Plugin.MediaDash.csproj
          --configuration Release --output publish
          -p:Version=${{ steps.version.outputs.version }}
          -p:AssemblyVersion=${{ steps.version.outputs.version }}
          -p:FileVersion=${{ steps.version.outputs.version }}

      - name: Package plugin zip
        run: |
          mkdir -p artifacts
          cd publish
          zip ../artifacts/mediadash_${{ steps.version.outputs.version }}.zip Jellyfin.Plugin.MediaDash.dll
          cd ..
          md5sum artifacts/mediadash_${{ steps.version.outputs.version }}.zip > artifacts/mediadash_${{ steps.version.outputs.version }}.zip.md5

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true

      # The plugin repository manifest.json (served via GitHub Pages or raw URL) should be
      # updated with this release's version, targetAbi, sourceUrl and checksum — see README release notes.
