name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore Jellyfin.Plugin.MediaDash/Jellyfin.Plugin.MediaDash.csproj

      - name: Build
        run: |
          dotnet build Jellyfin.Plugin.MediaDash/Jellyfin.Plugin.MediaDash.csproj \
            --configuration Release --no-restore -o build/

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Package zip
        run: |
          mkdir -p dist
          cp build/Jellyfin.Plugin.MediaDash.dll dist/
          cp meta.json dist/
          cd dist && zip -j ../mediadash_${{ steps.version.outputs.VERSION }}.0.zip ./*

      - name: Create release and upload zip
        id: release
        uses: softprops/action-gh-release@v2
        with:
          files: mediadash_${{ steps.version.outputs.VERSION }}.0.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute checksum from GitHub download
        # Download the asset back from GitHub — this is what Jellyfin will receive,
        # so this is the checksum we must record in the manifest.
        id: checksum
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          REPO="${{ github.repository }}"
          ASSET_URL="https://github.com/${REPO}/releases/download/v${VERSION}/mediadash_${VERSION}.0.zip"
          echo "Downloading from: $ASSET_URL"
          curl -sL "$ASSET_URL" -o /tmp/downloaded_asset.zip
          CHECKSUM=$(md5sum /tmp/downloaded_asset.zip | awk '{print $1}')
          echo "CHECKSUM=$CHECKSUM" >> $GITHUB_OUTPUT
          echo "Checksum: $CHECKSUM"

      - name: Update manifest.json
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          CHECKSUM: ${{ steps.checksum.outputs.CHECKSUM }}
          REPO: ${{ github.repository }}
        run: |
          python3 - << 'PYEOF'
          import json, os
          from datetime import datetime, timezone
          v = os.environ["VERSION"]
          c = os.environ["CHECKSUM"]
          r = os.environ["REPO"]
          ts = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")
          with open("manifest.json") as f:
              m = json.load(f)
          m[0]["versions"].insert(0, {
              "version": v + ".0",
              "changelog": f"See https://github.com/{r}/releases/tag/v{v}",
              "targetAbi": "10.11.0.0",
              "sourceUrl": f"https://github.com/{r}/releases/download/v{v}/mediadash_{v}.0.zip",
              "checksum": c,
              "timestamp": ts,
          })
          with open("manifest.json", "w") as f:
              json.dump(m, f, indent=2)
          print(f"manifest.json updated: version={v} checksum={c}")
          PYEOF

      - name: Commit manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git diff --staged --quiet || git commit -m "chore: update manifest for ${{ github.ref_name }}"
          git push origin HEAD:main
