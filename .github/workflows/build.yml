name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore Jellyfin.Plugin.MediaDash/Jellyfin.Plugin.MediaDash.csproj

      - name: Build
        run: |
          dotnet build Jellyfin.Plugin.MediaDash/Jellyfin.Plugin.MediaDash.csproj \
            --configuration Release --no-restore -o build/

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Package zip
        run: |
          mkdir -p dist
          cp build/Jellyfin.Plugin.MediaDash.dll dist/
          cp meta.json dist/
          cd dist && zip -j ../mediadash_${{ steps.version.outputs.VERSION }}.0.zip ./*

      - name: Compute checksum
        id: checksum
        run: |
          echo "CHECKSUM=$(md5sum mediadash_${{ steps.version.outputs.VERSION }}.0.zip | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: mediadash_${{ steps.version.outputs.VERSION }}.0.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update manifest
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          CHECKSUM: ${{ steps.checksum.outputs.CHECKSUM }}
          REPO: ${{ github.repository }}
        run: |
          python3 - << 'PYEOF'
          import json, os
          v = os.environ['VERSION']
          c = os.environ['CHECKSUM']
          r = os.environ['REPO']
          from datetime import datetime, timezone
          ts = datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%SZ')
          with open('manifest.json') as f:
              m = json.load(f)
          m[0]['versions'].insert(0, {
              'version': v + '.0',
              'changelog': f'See https://github.com/{r}/releases/tag/v{v}',
              'targetAbi': '10.11.0.0',
              'sourceUrl': f'https://github.com/{r}/releases/download/v{v}/mediadash_{v}.0.zip',
              'checksum': c,
              'timestamp': ts,
          })
          with open('manifest.json', 'w') as f:
              json.dump(m, f, indent=2)
          PYEOF

      - name: Commit manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git diff --staged --quiet || git commit -m "chore: update manifest for ${{ github.ref_name }}"
          git push origin HEAD:main
